name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          # Linux ARM64 — via cross (QEMU)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          # macOS x86_64 — native
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
          # macOS ARM64 — native (M1 runner)
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          # Windows x86_64 — native
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
          # Windows ARM64 — cross-compile (no native runner)
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Run tests (native)
        if: "!matrix.use_cross && !contains(matrix.target, 'aarch64-pc-windows')"
        run: cargo test --target ${{ matrix.target }}

      - name: Run tests (cross/QEMU)
        if: matrix.use_cross
        run: cross test --target ${{ matrix.target }}

      - name: Check 0 warnings
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          output=$(cargo build --release 2>&1)
          if echo "$output" | grep -q "^warning:"; then
            echo "::error::Build has warnings"
            echo "$output" | grep "^warning:"
            exit 1
          fi
