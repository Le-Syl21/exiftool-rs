name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            use_cross: false
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            use_cross: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install GUI dependencies (Linux)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libglib2.0-dev

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build CLI (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build GUI (native)
        if: "!matrix.use_cross"
        run: cargo build --release --features gui --target ${{ matrix.target }}

      - name: Build CLI (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Run tests (native)
        if: "!matrix.use_cross && matrix.target != 'x86_64-apple-darwin'"
        run: cargo test --target ${{ matrix.target }}

      - name: Run tests (cross)
        if: matrix.use_cross
        run: cross test --target ${{ matrix.target }}

      - name: Check 0 warnings
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          output=$(cargo build --release 2>&1)
          if echo "$output" | grep -q "^warning:"; then
            echo "::error::Build has warnings"
            echo "$output" | grep "^warning:"
            exit 1
          fi

      # --- Package CLI ---
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../exiftool-rs-cli-${{ matrix.label }}.tar.gz exiftool-rs
          cd ../../..

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path exiftool-rs.exe -DestinationPath ../../../exiftool-rs-cli-${{ matrix.label }}.zip
          cd ../../..

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: exiftool-rs-cli-${{ matrix.label }}
          path: exiftool-rs-cli-${{ matrix.label }}.*

      # --- Package GUI (native only, cross doesn't build GUI) ---
      - name: Package GUI (Unix)
        if: runner.os != 'Windows' && !matrix.use_cross
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../exiftool-rs-gui-${{ matrix.label }}.tar.gz exiftool-rs-gui
          cd ../../..

      - name: Package GUI (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path exiftool-rs-gui.exe -DestinationPath ../../../exiftool-rs-gui-${{ matrix.label }}.zip
          cd ../../..

      - name: Upload GUI artifact
        if: "!matrix.use_cross"
        uses: actions/upload-artifact@v4
        with:
          name: exiftool-rs-gui-${{ matrix.label }}
          path: exiftool-rs-gui-${{ matrix.label }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
