name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libglib2.0-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (CLI)
        run: cargo clippy --release -- -D warnings

      - name: Clippy (GUI)
        run: cargo clippy --release --features gui -- -D warnings

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install GUI dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libglib2.0-dev

      - name: Build CLI (with icon on Windows)
        run: cargo build --release ${{ runner.os == 'Windows' && '--features win-icon' || '' }}

      - name: Build GUI (with icon on Windows)
        run: cargo build --release --features gui${{ runner.os == 'Windows' && ',win-icon' || '' }}

      - name: Run tests
        if: matrix.target != 'x86_64-apple-darwin'
        run: cargo test

      # --- Apple signing & notarization ---
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign binaries (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_ID="Developer ID Application: Sylvain Gargasson ($APPLE_TEAM_ID)"
          codesign --force --options runtime \
            --sign "$SIGN_ID" \
            --timestamp \
            target/release/exiftool-rs
          codesign --force --options runtime \
            --sign "$SIGN_ID" \
            --timestamp \
            target/release/exiftool-rs-gui

      - name: Notarize binaries (macOS, tags only)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            target/release/exiftool-rs \
            $RUNNER_TEMP/exiftool-rs-cli.zip
          ditto -c -k --keepParent \
            target/release/exiftool-rs-gui \
            $RUNNER_TEMP/exiftool-rs-gui.zip

          # Submit and poll with timeout + retry (3 attempts, 5/15/45 min backoff)
          notarize_once() {
            local zip="$1" label="$2" timeout="$3"

            local output
            output=$(xcrun notarytool submit "$zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --verbose 2>&1)
            echo "$output"
            local sub_id
            sub_id=$(echo "$output" | awk '/id:/{print $2; exit}')
            [ -n "$sub_id" ] || { echo "$label: failed to get submission ID"; return 1; }
            echo "$label: submitted (id: $sub_id)"

            local deadline=$((SECONDS + timeout))
            while [ $SECONDS -lt $deadline ]; do
              sleep 30
              local info
              info=$(xcrun notarytool info "$sub_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1) || { echo "$label: network error, retrying poll..."; continue; }

              local status
              status=$(echo "$info" | awk '/status:/{print $2; exit}')
              echo "$label: $status"

              case "$status" in
                Accepted) return 0 ;;
                Invalid|Rejected)
                  xcrun notarytool log "$sub_id" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" 2>&1 || true
                  return 1 ;;
              esac
            done
            echo "$label: timed out after $((timeout / 60)) minutes"
            return 2  # timeout, retryable
          }

          notarize() {
            local zip="$1" label="$2"
            local backoffs=(300 900 2700)  # 5 / 15 / 45 minutes
            for i in 0 1 2; do
              echo "$label: attempt $((i + 1))/3"
              notarize_once "$zip" "$label" "${backoffs[$i]}" && return 0
              local rc=$?
              [ $rc -eq 2 ] || return $rc  # only retry on timeout (rc=2)
              [ $i -lt 2 ] && echo "$label: retrying after timeout..."
            done
            return 1
          }

          notarize "$RUNNER_TEMP/exiftool-rs-cli.zip" "CLI" &
          notarize "$RUNNER_TEMP/exiftool-rs-gui.zip" "GUI" &
          wait

      # --- Package CLI ---
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: tar czf exiftool-rs-cli-${{ matrix.label }}.tar.gz -C target/release exiftool-rs

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/exiftool-rs.exe -DestinationPath exiftool-rs-cli-${{ matrix.label }}.zip

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v5
        with:
          name: exiftool-rs-cli-${{ matrix.label }}
          path: exiftool-rs-cli-${{ matrix.label }}.*

      # --- Package GUI ---
      - name: Package GUI (Unix)
        if: runner.os != 'Windows'
        run: tar czf exiftool-rs-gui-${{ matrix.label }}.tar.gz -C target/release exiftool-rs-gui

      - name: Package GUI (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/exiftool-rs-gui.exe -DestinationPath exiftool-rs-gui-${{ matrix.label }}.zip

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v5
        with:
          name: exiftool-rs-gui-${{ matrix.label }}
          path: exiftool-rs-gui-${{ matrix.label }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
