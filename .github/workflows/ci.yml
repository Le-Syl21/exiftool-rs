name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install GUI dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libglib2.0-dev

      - name: Build CLI (with icon on Windows)
        run: cargo build --release ${{ runner.os == 'Windows' && '--features win-icon' || '' }}

      - name: Build GUI (with icon on Windows)
        run: cargo build --release --features gui${{ runner.os == 'Windows' && ',win-icon' || '' }}

      - name: Run tests
        if: matrix.target != 'x86_64-apple-darwin'
        run: cargo test

      - name: Check 0 warnings
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          output=$(cargo build --release 2>&1)
          if echo "$output" | grep -q "^warning:"; then
            echo "::error::Build has warnings"
            echo "$output" | grep "^warning:"
            exit 1
          fi

      # --- Package CLI ---
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: tar czf exiftool-rs-cli-${{ matrix.label }}.tar.gz -C target/release exiftool-rs

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/exiftool-rs.exe -DestinationPath exiftool-rs-cli-${{ matrix.label }}.zip

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: exiftool-rs-cli-${{ matrix.label }}
          path: exiftool-rs-cli-${{ matrix.label }}.*

      # --- Package GUI ---
      - name: Package GUI (Unix)
        if: runner.os != 'Windows'
        run: tar czf exiftool-rs-gui-${{ matrix.label }}.tar.gz -C target/release exiftool-rs-gui

      - name: Package GUI (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/exiftool-rs-gui.exe -DestinationPath exiftool-rs-gui-${{ matrix.label }}.zip

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: exiftool-rs-gui-${{ matrix.label }}
          path: exiftool-rs-gui-${{ matrix.label }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
