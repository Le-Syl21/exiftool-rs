name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
            artifact: exiftool-rs-linux-x86_64
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            use_cross: true
            artifact: exiftool-rs-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            artifact: exiftool-rs-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
            artifact: exiftool-rs-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            artifact: exiftool-rs-windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install GUI dependencies (Linux)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libglib2.0-dev

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build CLI (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build GUI (native)
        if: "!matrix.use_cross"
        run: cargo build --release --features gui --target ${{ matrix.target }}

      - name: Build + Test (cross/QEMU)
        if: matrix.use_cross
        run: |
          cross build --release --target ${{ matrix.target }}
          cross test --target ${{ matrix.target }}

      - name: Run tests
        if: "!matrix.use_cross && matrix.target != 'x86_64-apple-darwin'"
        run: cargo test --target ${{ matrix.target }}

      - name: Check 0 warnings
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          output=$(cargo build --release 2>&1)
          if echo "$output" | grep -q "^warning:"; then
            echo "::error::Build has warnings"
            echo "$output" | grep "^warning:"
            exit 1
          fi

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz exiftool-rs exiftool-rs-gui
          cd ../../..

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path exiftool-rs.exe,exiftool-rs-gui.exe -DestinationPath ../../../${{ matrix.artifact }}.zip
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
