[package]
name = "exiftool"
version = "0.1.0"
edition = "2021"
rust-version = "1.71"
description = "Read, write, and edit metadata in image, audio, video, and document files — a Rust reimplementation of ExifTool"
license = "GPL-3.0-or-later"
repository = "https://github.com/Le-Syl21/exiftool-rs"
homepage = "https://github.com/Le-Syl21/exiftool-rs"
documentation = "https://docs.rs/exiftool"
readme = "README.md"
keywords = ["exif", "metadata", "jpeg", "tiff", "xmp"]
categories = ["multimedia::images", "parser-implementations"]
exclude = [
    "scripts/",
    ".github/",
]

[[bin]]
name = "exiftool"
path = "src/main.rs"

[lib]
name = "exiftool"
path = "src/lib.rs"

[dependencies]
thiserror = "2"
byteorder = "1"
xml-rs = "0.8"
encoding_rs = "0.8"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
